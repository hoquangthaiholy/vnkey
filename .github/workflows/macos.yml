name: Build macOS Application

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Sources/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Sources/src-tauri -> target

      - name: Create .env file
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > Sources/.env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> Sources/.env
          echo "VNKEY_SYNC_PASSWORD=${{ secrets.VNKEY_SYNC_PASSWORD }}" >> Sources/.env

      - name: Run build script
        run: |
          chmod +x ./scripts/build_macos.sh
          ./scripts/build_macos.sh build-installer

      - name: List build artifacts (Diagnostic)
        run: |
          echo "=== Content of workspace root ==="
          ls -la
          echo "=== Content of .build directory ==="
          if [ -d ".build" ]; then
            ls -la .build
          else
            echo ".build directory does not exist!"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNKey-macOS-Build
          path: |
            .build/*.dmg
            .build/*.tar.gz
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            .build/*.dmg
            .build/*.tar.gz
