name: Bump Homebrew Formula

on:
  release:
    types: [published]

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew path
        run: echo /home/linuxbrew/.linuxbrew/bin >> $GITHUB_PATH

      - name: Tap and trust the formula
        run: |
          # Tap uses the full GitHub repo name (homebrew-vnkey).
          # Homebrew strips the 'homebrew-' prefix for the tap name (vnkey), which is used by brew trust.
          brew tap hoquangthaiholy/homebrew-vnkey
          brew trust hoquangthaiholy/vnkey

      - name: Bump Formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          # A personal access token (PAT) with 'repo' scope, stored as a secret in your vnkey repo.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Name of the formula file (without .rb, e.g. 'vnkey' to update 'vnkey.rb')
          formula: vnkey
          # The destination tap repository (e.g., username/homebrew-tap)
          tap: hoquangthaiholy/homebrew-vnkey
