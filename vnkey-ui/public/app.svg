<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bộ lọc bóng đổ mềm và các Gradient hiệu ứng -->
  <defs>
    <!-- Bóng đổ mềm màu xanh đậm để tạo chiều sâu giống Chrome/VS Code -->
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00183C" flood-opacity="0.3"/>
    </filter>

    <!-- Nền Gradient xanh dương đặc trưng -->
    <linearGradient id="glass-bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5599FF"/>
      <stop offset="100%" stop-color="#003B94"/>
    </linearGradient>

    <!-- Gradient bóng gương chéo góc (Rất nhẹ nhàng) -->
    <linearGradient id="reflection-gradient" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Viền kính trắng tinh tế -->
    <linearGradient id="border-gradient" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Gradients cho chữ V -->
    <linearGradient id="paint1_linear_19_57" x1="97.9703" y1="49.5926" x2="98.5174" y2="190.498" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#94C1FF"/>
    </linearGradient>
    <linearGradient id="paint2_linear_19_57" x1="166.75" y1="49.6373" x2="167.305" y2="175.088" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#94C1FF"/>
    </linearGradient>
  </defs>

  <!-- Group dịch chuyển 16px (lề 6.25% giống các app khác) và tỉ lệ 0.875 -->
  <g transform="translate(16, 16) scale(0.875)">
    <!-- Lớp 1: Nền Squircle bằng rect rx="51.2" có bóng đổ -->
    <rect width="256" height="256" rx="51.2" fill="url(#glass-bg)" filter="url(#glass-shadow)"/>

    <!-- Lớp 2: Logo V gốc -->
    <g>
      <path d="M106.037 203.647L54.4051 52.6471C53.9614 51.3492 54.9259 50 56.2976 50H90.0745C90.9276 50 91.6868 50.5411 91.9651 51.3475L144.084 202.347C144.533 203.646 143.568 205 142.194 205H107.93C107.075 205 106.314 204.456 106.037 203.647Z" fill="url(#paint1_linear_19_57)"/>
      <path d="M132.257 136.828L165.008 51.2849C165.304 50.511 166.047 50 166.876 50H200.56C201.971 50 202.938 51.4221 202.42 52.7346L151.01 182.911C150.325 184.645 147.849 184.581 147.254 182.814L132.229 138.182C132.081 137.741 132.091 137.263 132.257 136.828Z" fill="url(#paint2_linear_19_57)"/>
    </g>

    <!-- Lớp 3: Phản chiếu mặt kính -->
    <rect width="256" height="256" rx="51.2" fill="url(#reflection-gradient)"/>

    <!-- Lớp 4: Đường viền nổi kính phản quang -->
    <rect width="256" height="256" rx="51.2" stroke="url(#border-gradient)" stroke-width="1.5" fill="none"/>
  </g>
</svg>
